name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests
        id: unit_tests
        run: |
          mkdir -p artifacts
          set +e
          go test ./... 2>&1 | tee artifacts/test.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT
          if [ "$TEST_EXIT_CODE" -ne 0 ]; then
            exit 1
          fi

      - name: Create GitHub issue on test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const branch = process.env.GITHUB_REF.replace('refs/heads/', '');
            const title = `CI failure: Go unit tests failed on ${branch}`;
            const body = `## Go unit test failure\n\n` +
              `**Repository:** ${{ github.repository }}\n` +
              `**Branch:** ${branch}\n` +
              `**Commit:** ${{ github.sha }}\n` +
              `**Workflow:** ${{ github.workflow }}\n` +
              `**Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n` +
              `### Test output\n\n` +
              '```
' + fs.readFileSync('artifacts/test.log', 'utf8') + '\n```\n\n' +
              `Please check failing tests and fix the issue.`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const exists = issues.some(issue => issue.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
